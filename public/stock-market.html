<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockSim</title>
<style>
:root{
  --bg:#0c0c0f;--s1:#111115;--s2:#18181e;--s3:#222228;
  --border:#26262f;--text:#e2e2ec;--t2:#7a7a90;--t3:#3a3a50;
  --green:#00c87a;--gdim:rgba(0,200,122,.1);
  --red:#ff4040;--rdim:rgba(255,64,64,.1);
  --blue:#2563eb;--yellow:#f59e0b;
  --mono:'SF Mono','Consolas','Monaco',monospace;
}
[data-theme=light]{
  --bg:#eef0f4;--s1:#fff;--s2:#f5f6fa;--s3:#eaecf2;
  --border:#dde0e8;--text:#12131a;--t2:#5a5c72;--t3:#b0b2c8;
  --green:#006d3a;--gdim:rgba(0,109,58,.08);
  --red:#bf2600;--rdim:rgba(191,38,0,.08);
  --blue:#1d4ed8;--yellow:#d97706;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px}

.hdr{height:50px;background:var(--s1);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:0;flex-shrink:0;z-index:20}
.logo{font-size:15px;font-weight:800;letter-spacing:-.8px;margin-right:16px;white-space:nowrap}
.logo b{color:var(--blue)}
.indices{display:flex;gap:0;margin-right:auto}
.idx{padding:0 12px;border-right:1px solid var(--border);line-height:1}
.idx .in{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.5px}
.idx .iv{font-size:13px;font-weight:700;font-family:var(--mono);margin-top:1px}
.idx .ic{font-size:10px;font-family:var(--mono)}
.srch{position:relative;margin:0 10px}
.srch input{background:var(--s2);border:1px solid var(--border);color:var(--text);padding:6px 10px 6px 30px;border-radius:6px;font-size:12px;width:200px;outline:none;transition:.15s}
.srch input:focus{border-color:var(--blue);width:240px}
.srch input::placeholder{color:var(--t3)}
.srch svg{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--t3)}
.hpf{text-align:right;padding:0 12px;border-left:1px solid var(--border)}
.hpf .lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px}
.hpf .val{font-size:14px;font-weight:700;font-family:var(--mono)}
.tbtn{background:var(--s2);border:1px solid var(--border);color:var(--t2);padding:5px 12px;border-radius:6px;cursor:pointer;font-size:11px;font-weight:600;margin-left:10px;transition:.15s}
.tbtn:hover{color:var(--text)}

.main{display:flex;height:calc(100vh - 50px)}
.left{display:flex;flex-direction:column;flex:1;min-width:0;border-right:1px solid var(--border)}
.filter-bar{display:flex;align-items:center;border-bottom:1px solid var(--border);background:var(--s1);flex-shrink:0;padding:0 4px}
.tab{padding:10px 14px;font-size:12px;font-weight:600;cursor:pointer;color:var(--t2);border-bottom:2px solid transparent;transition:.15s;white-space:nowrap;background:none;border-left:none;border-right:none;border-top:none}
.tab:hover{color:var(--text)}
.tab.act{color:var(--blue);border-bottom-color:var(--blue)}
.sector-sel{margin-left:auto;margin-right:8px;background:var(--s2);border:1px solid var(--border);color:var(--t2);padding:4px 8px;border-radius:5px;font-size:11px;outline:none;cursor:pointer}
.count-badge{font-size:10px;color:var(--t3);margin-left:auto;margin-right:12px;white-space:nowrap}

.tbl-wrap{overflow-y:auto;flex:1}
.tbl-wrap::-webkit-scrollbar{width:4px}
.tbl-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
table{width:100%;border-collapse:collapse}
thead{position:sticky;top:0;z-index:5;background:var(--s1)}
thead th{padding:7px 10px;text-align:right;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--t3);border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none}
thead th:hover{color:var(--t2)}
thead th:first-child{text-align:left;padding-left:12px;width:30px}
thead th:nth-child(2){text-align:left}
tbody tr{border-bottom:1px solid var(--border);cursor:pointer;transition:background .08s}
tbody tr:hover{background:var(--s2)}
tbody tr.sel{background:var(--s2)}
td{padding:8px 10px;text-align:right;white-space:nowrap;vertical-align:middle}
td:first-child{padding-left:12px;width:30px}
td:nth-child(2){text-align:left}
.sym{font-weight:700;font-size:12px;font-family:var(--mono)}
.co{font-size:10px;color:var(--t2);margin-top:1px;max-width:170px;overflow:hidden;text-overflow:ellipsis}
.pr{font-family:var(--mono);font-weight:600;font-size:12px}
.chg{font-family:var(--mono);font-size:11px;padding:2px 6px;border-radius:3px;display:inline-block}
.up{color:var(--green);background:var(--gdim)}
.dn{color:var(--red);background:var(--rdim)}
.vol{font-family:var(--mono);font-size:11px;color:var(--t2)}
.star{cursor:pointer;font-size:13px;color:var(--t3);background:none;border:none;line-height:1;transition:.1s;padding:0}
.star:hover,.star.on{color:var(--yellow)}

.right{width:390px;flex-shrink:0;display:flex;flex-direction:column;background:var(--s1)}
.rscroll{flex:1;overflow-y:auto}
.rscroll::-webkit-scrollbar{width:4px}
.rscroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* DEFAULT PANEL */
.mkt-overview{padding:14px}
.ov-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--t3);margin-bottom:10px}
.idx-cards{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.idx-card{background:var(--s2);border:1px solid var(--border);border-radius:7px;padding:10px;text-align:center}
.idx-card .icn{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.idx-card .icv{font-size:13px;font-weight:700;font-family:var(--mono)}
.idx-card .icc{font-size:10px;font-family:var(--mono);margin-top:2px}
.movers-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.mover-col{}
.mover-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--t3);margin-bottom:6px}
.mover-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);cursor:pointer}
.mover-row:last-child{border-bottom:none}
.mover-row:hover .msym{color:var(--blue)}
.msym{font-family:var(--mono);font-weight:700;font-size:12px;transition:.1s}
.mpct{font-family:var(--mono);font-size:11px}
.act-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);cursor:pointer}
.act-row:last-child{border-bottom:none}
.act-row:hover .msym{color:var(--blue)}
.avol{font-family:var(--mono);font-size:11px;color:var(--t2)}

/* DETAIL */
.sk-hdr{padding:14px 14px 10px;border-bottom:1px solid var(--border)}
.sk-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.sk-sym{font-size:20px;font-weight:800;font-family:var(--mono)}
.sk-name{font-size:11px;color:var(--t2);margin-top:2px}
.sk-sec{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.sk-r{text-align:right}
.sk-price{font-size:28px;font-weight:700;font-family:var(--mono);letter-spacing:-1.2px;line-height:1}
.sk-chg{font-size:12px;font-family:var(--mono);margin-top:3px}
.sk-meta{display:flex;gap:12px;font-size:11px;color:var(--t2);font-family:var(--mono);margin-top:6px;flex-wrap:wrap}
.watch-btn{display:flex;align-items:center;gap:6px;margin-top:10px;background:none;border:1px solid var(--border);color:var(--t2);padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer;transition:.15s;font-weight:600}
.watch-btn:hover{border-color:var(--yellow);color:var(--yellow)}
.watch-btn.on{border-color:var(--yellow);color:var(--yellow);background:rgba(245,158,11,.08)}

.chart-sec{padding:10px 12px 6px;border-bottom:1px solid var(--border)}
.ct-tabs{display:flex;gap:2px;margin-bottom:8px}
.ct{padding:3px 9px;border-radius:4px;font-size:10px;font-weight:700;cursor:pointer;color:var(--t2);background:transparent;border:none;transition:.15s}
.ct:hover{color:var(--text)}
.ct.act{background:var(--s3);color:var(--text)}

.stats-grid{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border)}
.stat{padding:9px 14px;border-bottom:1px solid var(--border);border-right:1px solid var(--border)}
.stat:nth-child(2n){border-right:none}
.slbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.sval{font-size:12px;font-weight:600;font-family:var(--mono)}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;color:var(--t3);gap:8px}
.empty svg{opacity:.12}
.empty p{font-size:12px}

.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(50px);background:var(--s1);border:1px solid var(--border);padding:10px 18px;border-radius:7px;font-size:12px;box-shadow:0 8px 24px rgba(0,0,0,.4);opacity:0;transition:.2s ease;z-index:999;pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.ok{border-left:3px solid var(--green)}
.toast.err{border-left:3px solid var(--red)}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
</style>
</head>

          <th>Trend</th>
          <th onclick="srt('cap')">Mkt Cap</th>
          <th onclick="srt('vol')">Volume</th>
        </tr></thead>
        <tbody id="tbl"></tbody>
      </table>
    </div>
  </div>
  <div class="right"><div class="rscroll" id="rpanel"><div id="default-panel"></div></div></div>
</div>

['XLB','Materials Select Sector','ETF',88.40,.0015,3e6,116e6,0,2.00],
['XLI','Industrial Select Sector','ETF',118.40,.0012,5e6,241e6,0,1.80],
['ARKK','ARK Innovation ETF','ETF',48.40,.0060,12e6,124e6,0,0],
['ARKG','ARK Genomic Revolution','ETF',22.40,.0070,5e6,75e6,0,0],
['VNQ','Vanguard Real Estate ETF','ETF',82.40,.0012,5e6,370e6,0,4.60],
['VGT','Vanguard Info Technology','ETF',498.40,.0015,3e6,149e6,0,1.00],
['SMH','VanEck Semiconductor ETF','ETF',248.40,.0020,3e6,71e6,0,1.40],
['SOXX','iShares Semiconductor ETF','ETF',218.40,.0020,3e6,46e6,0,1.20],
]

// Build stock objects
const STOCKS=RAW.map(r=>({s:r[0],n:r[1],sec:r[2],p:r[3],v:r[4],bv:r[5],so:r[6],pe:r[7],div:r[8]}))

// ─── INIT ─────────────────────────────────────────────────────────────────────
const prices={},opens={},hist={},vols={}
STOCKS.forEach(st=>{
  prices[st.s]=st.p; opens[st.s]=st.p; vols[st.s]=st.bv
  const h=[]; let p=st.p
  for(let i=500;i>0;i--){p=p/(1+st.v*2*(Math.random()-.5));h.unshift(p)}
  h.push(st.p); hist[st.s]=h
})

const IDX={
  spx:{v:5432.18,b:5432.18,vol:.0008},
  comp:{v:17254.42,b:17254.42,vol:.0012},
  dji:{v:39142.23,b:39142.23,vol:.0006},
  rut:{v:2062.84,b:2062.84,vol:.0014},
  vix:{v:14.82,b:14.82,vol:.0060}
}

const watchlist=new Set()
let sel=null,period='1D',chartEl=null
let curTab='all',curSec='',searchQ='',srtKey='',srtDir=-1
let toastTmr=null

// ─── SIMULATION ───────────────────────────────────────────────────────────────
function tick(){
  STOCKS.forEach(st=>{
    const d=prices[st.s]*st.v*(Math.random()-.5)*2
    prices[st.s]=Math.max(.1,prices[st.s]+d)
    hist[st.s].push(prices[st.s])
    if(hist[st.s].length>600)hist[st.s].shift()
    vols[st.s]=Math.round(st.bv*(.65+Math.random()*.7))
  })
  Object.values(IDX).forEach(ix=>{
    ix.v=Math.max(.1,ix.v+ix.v*ix.vol*(Math.random()-.5)*2)
  })
  renderTable(); renderIdx()
  if(sel){refreshHdr();drawChart()}
  else renderDefault()
}

// ─── FORMAT ───────────────────────────────────────────────────────────────────
const f2=n=>n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})
const fvol=n=>n>=1e9?(n/1e9).toFixed(2)+'B':n>=1e6?(n/1e6).toFixed(2)+'M':(n/1e3).toFixed(0)+'K'
const fcap=n=>n>=1e12?(n/1e12).toFixed(2)+'T':n>=1e9?(n/1e9).toFixed(1)+'B':(n/1e6).toFixed(0)+'M'
const css=v=>getComputedStyle(document.documentElement).getPropertyValue(v).trim()
const sg=n=>n>=0?'+':''

// ─── INDICES ─────────────────────────────────────────────────────────────────
function renderIdx(){
  const map={spx:'spx',comp:'comp',dji:'dji',rut:'rut',vix:'vix'}
  Object.entries(map).forEach(([k])=>{
    const ix=IDX[k],chg=(ix.v-ix.b)/ix.b*100
    const el=document.getElementById('i-'+k),ce=document.getElementById('ic-'+k)
    if(el)el.textContent=ix.v.toLocaleString('en-US',{maximumFractionDigits:2})
    if(ce&&k!=='vix'){ce.textContent=sg(chg)+chg.toFixed(2)+'%';ce.className='ic '+(chg>=0?'up':'dn')}
    else if(ce&&k==='vix'){ce.textContent='VIX';ce.className='ic';ce.style.color='var(--t2)'}
  })
}

// ─── SPARKLINE ────────────────────────────────────────────────────────────────
function drawSpark(c,data){
  const ctx=c.getContext('2d'),W=c.width,H=c.height
  ctx.clearRect(0,0,W,H)
  const d=data.slice(-50); if(d.length<2)return
  const mn=Math.min(...d),mx=Math.max(...d),rng=mx-mn||1
  const isUp=d[d.length-1]>=d[0]
  ctx.beginPath(); ctx.strokeStyle=css(isUp?'--green':'--red'); ctx.lineWidth=1.5; ctx.lineJoin='round'
  d.forEach((p,i)=>{const x=i/(d.length-1)*W,y=H-((p-mn)/rng)*H*.8-H*.1;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)})
  ctx.stroke()
}

// ─── MAIN CHART ───────────────────────────────────────────────────────────────
function drawChart(){
  if(!sel||!chartEl)return
  const c=chartEl,W=c.width,H=c.height,ctx=c.getContext('2d')
  ctx.clearRect(0,0,W,H)
  const full=hist[sel]
  const d=period==='1D'?full.slice(-60):period==='1W'?full.slice(-200):period==='1M'?full.slice(-300):period==='3M'?full.slice(-450):full
  if(d.length<2)return
  const mn=Math.min(...d),mx=Math.max(...d),pad=(mx-mn)*.1||1
  const lo=mn-pad,hi=mx+pad,rng=hi-lo
  const px=i=>i/(d.length-1)*W, py=v=>H-((v-lo)/rng)*H
  const isUp=d[d.length-1]>=d[0],color=css(isUp?'--green':'--red')
  ctx.lineWidth=.5; ctx.strokeStyle=css('--border'); ctx.fillStyle=css('--t3'); ctx.font='9px SF Mono,Consolas,monospace'
  for(let i=1;i<5;i++){const y=H*i/5;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();ctx.fillText('$'+f2(hi-rng*y/H),3,y-3)}
  const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,color+'25'); g.addColorStop(1,color+'00')
  ctx.beginPath(); ctx.moveTo(px(0),py(d[0])); d.forEach((p,i)=>ctx.lineTo(px(i),py(p)))
  ctx.lineTo(px(d.length-1),H); ctx.lineTo(0,H); ctx.closePath(); ctx.fillStyle=g; ctx.fill()
  ctx.beginPath(); ctx.strokeStyle=color; ctx.lineWidth=1.8; ctx.lineJoin='round'
  d.forEach((p,i)=>i===0?ctx.moveTo(px(i),py(p)):ctx.lineTo(px(i),py(p))); ctx.stroke()
  const lx=px(d.length-1),ly=py(d[d.length-1])
  ctx.beginPath(); ctx.arc(lx,ly,3.5,0,Math.PI*2); ctx.fillStyle=color; ctx.fill()
}

// ─── TABLE ────────────────────────────────────────────────────────────────────
function getVisible(){
  let list=STOCKS.slice()
  const q=searchQ.toLowerCase()
  if(q)list=list.filter(st=>st.s.toLowerCase().includes(q)||st.n.toLowerCase().includes(q))
  if(curSec)list=list.filter(st=>st.sec===curSec)
  if(curTab==='watchlist')list=list.filter(st=>watchlist.has(st.s))
  if(curTab==='gainers')list=list.slice().sort((a,b)=>((prices[b.s]-opens[b.s])/opens[b.s])-((prices[a.s]-opens[a.s])/opens[a.s])).slice(0,25)
  if(curTab==='losers')list=list.slice().sort((a,b)=>((prices[a.s]-opens[a.s])/opens[a.s])-((prices[b.s]-opens[b.s])/opens[b.s])).slice(0,25)
  if(srtKey){
    list=list.slice().sort((a,b)=>{
      const va=srtKey==='p'?prices[a.s]:srtKey==='chg'?prices[a.s]-opens[a.s]:srtKey==='pct'?(prices[a.s]-opens[a.s])/opens[a.s]:srtKey==='cap'?prices[a.s]*a.so:srtKey==='vol'?vols[a.s]:a.s
      const vb=srtKey==='p'?prices[b.s]:srtKey==='chg'?prices[b.s]-opens[b.s]:srtKey==='pct'?(prices[b.s]-opens[b.s])/opens[b.s]:srtKey==='cap'?prices[b.s]*b.so:srtKey==='vol'?vols[b.s]:b.s
      return typeof va==='string'?va.localeCompare(vb)*srtDir:(va-vb)*srtDir
    })
  }
  return list
}

function renderTable(){
  const tbody=document.getElementById('tbl'); if(!tbody)return
  const visible=getVisible()
  const visSet=new Set(visible.map(st=>st.s))
  tbody.querySelectorAll('tr').forEach(r=>{if(!visSet.has(r.dataset.sym))r.remove()})
  const existing=new Set([...tbody.querySelectorAll('tr')].map(r=>r.dataset.sym))
  const badge=document.getElementById('count-badge')
  if(badge)badge.textContent=visible.length+' stocks'

  visible.forEach(st=>{
    const s=st.s,p=prices[s],o=opens[s],chg=p-o,pct=chg/o*100,up=chg>=0,cls=up?'up':'dn',si=up?'+':''
    if(!existing.has(s)){
      const tr=document.createElement('tr'); tr.dataset.sym=s; tr.onclick=()=>selectStock(s)
      tr.innerHTML=`<td><button class="star" id="star-${s}" onclick="toggleStar('${s}',event)">★</button></td>
        <td><div class="sym">${s}</div><div class="co">${st.n}</div></td>
        <td class="pr" id="p-${s}"></td><td id="c-${s}"></td><td id="pc-${s}"></td>
        <td><canvas id="sp-${s}" width="72" height="26"></canvas></td>
        <td class="vol" id="mc-${s}"></td><td class="vol" id="v-${s}"></td>`
      tbody.appendChild(tr)
    }
    const tr=tbody.querySelector(`tr[data-sym="${s}"]`); if(tr)tr.classList.toggle('sel',sel===s)
    const pe=document.getElementById('p-'+s); if(pe)pe.textContent='$'+f2(p)
    const ce=document.getElementById('c-'+s); if(ce)ce.innerHTML=`<span class="chg ${cls}">${si}$${f2(Math.abs(chg))}</span>`
    const pce=document.getElementById('pc-'+s); if(pce)pce.innerHTML=`<span class="chg ${cls}">${si}${pct.toFixed(2)}%</span>`
    const ve=document.getElementById('v-'+s); if(ve)ve.textContent=fvol(vols[s])
    const me=document.getElementById('mc-'+s); if(me)me.textContent=fcap(p*st.so)
    const sp=document.getElementById('sp-'+s); if(sp)drawSpark(sp,hist[s])
    const se=document.getElementById('star-'+s); if(se)se.className='star '+(watchlist.has(s)?'on':'')
  })
}

// ─── DEFAULT PANEL ────────────────────────────────────────────────────────────
function renderDefault(){
  const el=document.getElementById('default-panel'); if(!el||sel)return
  const gainers=STOCKS.slice().sort((a,b)=>((prices[b.s]-opens[b.s])/opens[b.s])-((prices[a.s]-opens[a.s])/opens[a.s])).slice(0,8)
  const losers=STOCKS.slice().sort((a,b)=>((prices[a.s]-opens[a.s])/opens[a.s])-((prices[b.s]-opens[b.s])/opens[b.s])).slice(0,8)
  const active=STOCKS.slice().sort((a,b)=>vols[b.s]-vols[a.s]).slice(0,6)

  el.innerHTML=`
  <div class="mkt-overview">
    <div class="ov-title">Market Overview</div>
    <div class="idx-cards">
      ${[['S&P 500','spx'],['NASDAQ','comp'],['Dow Jones','dji'],['Russell 2K','rut'],['VIX','vix']].map(([nm,k])=>{
        const ix=IDX[k],chg=(ix.v-ix.b)/ix.b*100,up=chg>=0
        return `<div class="idx-card" style="grid-column:${k==='vix'?'3':'auto'}">
          <div class="icn">${nm}</div>
          <div class="icv">${ix.v.toLocaleString('en-US',{maximumFractionDigits:2})}</div>
          <div class="icc ${k!=='vix'?up?'up':'dn':''}">${k!=='vix'?sg(chg)+chg.toFixed(2)+'%':'Fear/Greed'}</div>
        </div>`}).join('')}
    </div>
    <div class="movers-grid">
      <div class="mover-col">
        <div class="mover-title" style="color:var(--green)">Top Gainers</div>
        ${gainers.map(st=>{const p=prices[st.s],pct=(p-opens[st.s])/opens[st.s]*100;return`<div class="mover-row" onclick="selectStock('${st.s}')"><span class="msym">${st.s}</span><span class="mpct up">+${pct.toFixed(2)}%</span></div>`}).join('')}
      </div>
      <div class="mover-col">
        <div class="mover-title" style="color:var(--red)">Top Losers</div>
        ${losers.map(st=>{const p=prices[st.s],pct=(p-opens[st.s])/opens[st.s]*100;return`<div class="mover-row" onclick="selectStock('${st.s}')"><span class="msym">${st.s}</span><span class="mpct dn">${pct.toFixed(2)}%</span></div>`}).join('')}
      </div>
    </div>
    <div class="ov-title" style="margin-top:4px">Most Active</div>
    ${active.map(st=>`<div class="act-row" onclick="selectStock('${st.s}')"><span class="msym">${st.s}</span><span class="co" style="flex:1;margin:0 8px">${st.n}</span><span class="avol">${fvol(vols[st.s])}</span></div>`).join('')}
  </div>`
}

// ─── SELECT ───────────────────────────────────────────────────────────────────
function selectStock(s){
  sel=s; period='1D'; renderTable(); buildDetail()
}

function refreshHdr(){
  if(!sel)return
  const p=prices[sel],o=opens[sel],chg=p-o,pct=chg/o*100,up=chg>=0,si=up?'+':''
  const pe=document.getElementById('d-price'),ce=document.getElementById('d-chg')
  if(pe)pe.textContent='$'+f2(p)
  if(ce){ce.className='sk-chg '+(up?'up':'dn');ce.textContent=si+'$'+f2(Math.abs(chg))+' ('+si+pct.toFixed(2)+'%)'}
}

function buildDetail(){
  const st=STOCKS.find(x=>x.s===sel); if(!st)return
  const p=prices[sel],o=opens[sel],chg=p-o,pct=chg/o*100,up=chg>=0,si=up?'+':'',cls=up?'up':'dn'
  const cap=p*st.so, h=hist[sel]
  const hi52=Math.max(...h)*1.02, lo52=Math.min(...h)*.98
  const eps=st.pe>0?p/st.pe:null
  const divY=st.div>0?st.div/p*100:0
  const beta=(st.v/0.002).toFixed(2)
  const prevClose=o*(1+st.v*(Math.random()-.5)*.5)

  document.getElementById('rpanel').innerHTML=`
    <div class="sk-hdr">
      <div class="sk-top">
        <div><div class="sk-sym">${sel}</div><div class="sk-name">${st.n}</div><div class="sk-sec">${st.sec}</div></div>
        <div class="sk-r"><div class="sk-price" id="d-price">$${f2(p)}</div><div class="sk-chg ${cls}" id="d-chg">${si}$${f2(Math.abs(chg))} (${si}${pct.toFixed(2)}%)</div></div>
      </div>
      <div class="sk-meta">
        <span>Vol: ${fvol(vols[sel])}</span>
        <span>Mkt Cap: ${fcap(cap)}</span>
        <span>Beta: ${beta}</span>
        ${st.div>0?`<span>Div: $${st.div.toFixed(2)} (${divY.toFixed(2)}%)</span>`:''}
      </div>
      <button class="watch-btn${watchlist.has(sel)?' on':''}" onclick="toggleStar('${sel}',event)" style="margin-top:10px">
        ★ ${watchlist.has(sel)?'In Watchlist':'Add to Watchlist'}
      </button>
    </div>
    <div class="chart-sec">
      <div class="ct-tabs">
        ${['1D','1W','1M','3M','1Y','Max'].map(t=>`<button class="ct${t===period?' act':''}" onclick="setPeriod('${t}')">${t}</button>`).join('')}
      </div>
      <canvas id="main-chart" style="display:block;width:100%;height:152px" width="370" height="152"></canvas>
    </div>
    <div class="stats-grid">
      <div class="stat"><div class="slbl">Open</div><div class="sval">$${f2(o)}</div></div>
      <div class="stat"><div class="slbl">Prev Close</div><div class="sval">$${f2(prevClose)}</div></div>
      <div class="stat"><div class="slbl">Day High</div><div class="sval up">$${f2(Math.max(...h.slice(-60)))}</div></div>
      <div class="stat"><div class="slbl">Day Low</div><div class="sval dn">$${f2(Math.min(...h.slice(-60)))}</div></div>
      <div class="stat"><div class="slbl">52W High</div><div class="sval up">$${f2(hi52)}</div></div>
      <div class="stat"><div class="slbl">52W Low</div><div class="sval dn">$${f2(lo52)}</div></div>
      <div class="stat"><div class="slbl">Market Cap</div><div class="sval">${fcap(cap)}</div></div>
      <div class="stat"><div class="slbl">Volume</div><div class="sval">${fvol(vols[sel])}</div></div>
      <div class="stat"><div class="slbl">Avg Volume</div><div class="sval">${fvol(st.bv)}</div></div>
      <div class="stat"><div class="slbl">Shares Out</div><div class="sval">${fcap(st.so)}</div></div>
      <div class="stat"><div class="slbl">P/E Ratio</div><div class="sval">${st.pe>0?st.pe.toFixed(1):'—'}</div></div>
      <div class="stat"><div class="slbl">EPS (TTM)</div><div class="sval">${eps?'$'+f2(eps):'—'}</div></div>
      <div class="stat"><div class="slbl">Dividend</div><div class="sval">${st.div>0?'$'+st.div.toFixed(2):'—'}</div></div>
      <div class="stat"><div class="slbl">Div Yield</div><div class="sval">${divY>0?divY.toFixed(2)+'%':'—'}</div></div>
      <div class="stat"><div class="slbl">Beta</div><div class="sval">${beta}</div></div>
      <div class="stat"><div class="slbl">Sector</div><div class="sval" style="font-family:inherit;font-size:11px">${st.sec}</div></div>
    </div>
  `
  chartEl=document.getElementById('main-chart'); drawChart()
}

function setPeriod(p){
  period=p
  document.querySelectorAll('.ct').forEach(el=>el.classList.toggle('act',el.textContent===p))
  drawChart()
}

// ─── CONTROLS ─────────────────────────────────────────────────────────────────
function toggleStar(s,e){
  e.stopPropagation()
  watchlist.has(s)?watchlist.delete(s):watchlist.add(s)
  toast(watchlist.has(s)?`${s} added to watchlist`:`${s} removed from watchlist`,'ok')
  renderTable()
  if(sel===s)buildDetail()
}

function setTab(t,el){
  curTab=t; srtKey=''; srtDir=-1
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('act'))
  el.classList.add('act')
  renderTable()
}

function onSearch(){searchQ=document.getElementById('search').value;renderTable()}
function onSector(){curSec=document.getElementById('sec-sel').value;renderTable()}
function srt(k){if(srtKey===k)srtDir*=-1;else{srtKey=k;srtDir=-1};renderTable()}

function toggleTheme(){
  const dark=document.documentElement.getAttribute('data-theme')==='dark'
  document.documentElement.setAttribute('data-theme',dark?'light':'dark')
  document.getElementById('tbtn').textContent=dark?'Dark':'Light'
  setTimeout(()=>{renderTable();if(sel)drawChart()},30)
}

function toast(msg,t){
  const el=document.getElementById('toast'); el.textContent=msg; el.className='toast '+t+' show'
  clearTimeout(toastTmr); toastTmr=setTimeout(()=>el.classList.remove('show'),2500)
}

// ─── START ────────────────────────────────────────────────────────────────────
renderTable(); renderIdx(); renderDefault()
setInterval(tick,1400)
</script>
