<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockSim</title>
<style>
:root{
  --bg:#0c0c0f;--s1:#141418;--s2:#1c1c22;--s3:#242430;
  --border:#2a2a36;--text:#e8e8f0;--t2:#888898;--t3:#44445a;
  --green:#00c87a;--gdim:rgba(0,200,122,.1);
  --red:#ff4545;--rdim:rgba(255,69,69,.1);
  --blue:#2563eb;--yellow:#f59e0b;
  --mono:'SF Mono','Consolas','Monaco',monospace;
}
[data-theme=light]{
  --bg:#f0f1f3;--s1:#ffffff;--s2:#f7f8fa;--s3:#eef0f3;
  --border:#e2e4e9;--text:#111218;--t2:#5a5b6a;--t3:#b8bac8;
  --green:#006d3a;--gdim:rgba(0,109,58,.08);
  --red:#c0392b;--rdim:rgba(192,57,43,.08);
  --blue:#1d4ed8;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px}

/* HEADER */
.hdr{height:52px;background:var(--s1);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:0;flex-shrink:0;z-index:20}
.logo{font-size:16px;font-weight:800;letter-spacing:-.8px;margin-right:20px;white-space:nowrap}
.logo b{color:var(--blue)}

.indices{display:flex;gap:0;margin-right:auto}
.idx{padding:0 14px;border-right:1px solid var(--border);cursor:default}
.idx .iname{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.5px}
.idx .ival{font-size:13px;font-weight:600;font-family:var(--mono)}
.idx .ichg{font-size:10px;font-family:var(--mono)}

.search-wrap{position:relative;margin:0 12px}
.search-wrap input{background:var(--s2);border:1px solid var(--border);color:var(--text);padding:7px 10px 7px 32px;border-radius:7px;font-size:12px;width:220px;outline:none;transition:.15s}
.search-wrap input:focus{border-color:var(--blue);width:260px}
.search-wrap input::placeholder{color:var(--t3)}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--t3);pointer-events:none}

.hdr-pf{text-align:right;padding:0 14px;border-left:1px solid var(--border)}
.hdr-pf .lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px}
.hdr-pf .val{font-size:15px;font-weight:700;font-family:var(--mono)}
.tbtn{background:var(--s2);border:1px solid var(--border);color:var(--t2);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:11px;font-weight:600;margin-left:12px;transition:.15s;white-space:nowrap}
.tbtn:hover{color:var(--text)}

/* MAIN */
.main{display:flex;height:calc(100vh - 52px)}

/* LEFT */
.left{display:flex;flex-direction:column;flex:1;min-width:0;border-right:1px solid var(--border)}
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--s1);flex-shrink:0}
.tab{padding:10px 16px;font-size:12px;font-weight:600;cursor:pointer;color:var(--t2);border-bottom:2px solid transparent;transition:.15s;white-space:nowrap}
.tab:hover{color:var(--text)}
.tab.act{color:var(--blue);border-bottom-color:var(--blue)}
.sector-select{margin-left:auto;margin-right:8px;align-self:center;background:var(--s2);border:1px solid var(--border);color:var(--t2);padding:4px 8px;border-radius:5px;font-size:11px;outline:none;cursor:pointer}

.tbl-wrap{overflow-y:auto;flex:1}
.tbl-wrap::-webkit-scrollbar{width:4px}
.tbl-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
table{width:100%;border-collapse:collapse}
thead{position:sticky;top:0;z-index:5;background:var(--s1)}
thead th{padding:8px 10px;text-align:right;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--t3);border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none}
thead th:hover{color:var(--t2)}
thead th:first-child{text-align:left;padding-left:14px}
tbody tr{border-bottom:1px solid var(--border);cursor:pointer;transition:background .08s}
tbody tr:hover{background:var(--s2)}
tbody tr.sel{background:var(--s2)}
td{padding:9px 10px;text-align:right;white-space:nowrap;vertical-align:middle}
td:first-child{text-align:left;padding-left:14px}
td.sym-cell{max-width:200px}
.sym{font-weight:700;font-size:12px;font-family:var(--mono)}
.co{font-size:10px;color:var(--t2);margin-top:1px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sector-badge{font-size:9px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.price{font-family:var(--mono);font-weight:600;font-size:12px}
.chg{font-family:var(--mono);font-size:11px;padding:2px 6px;border-radius:3px;display:inline-block}
.up{color:var(--green);background:var(--gdim)}
.dn{color:var(--red);background:var(--rdim)}
.vol{font-family:var(--mono);font-size:11px;color:var(--t2)}
.star{cursor:pointer;font-size:14px;color:var(--t3);padding:0 2px;transition:.1s;background:none;border:none;line-height:1}
.star:hover,.star.on{color:var(--yellow)}
td.star-cell{width:28px;padding-right:8px}
.mktcap{font-family:var(--mono);font-size:11px;color:var(--t2)}

/* RIGHT */
.right{width:400px;flex-shrink:0;display:flex;flex-direction:column;overflow:hidden;background:var(--s1)}
.right-scroll{flex:1;overflow-y:auto}
.right-scroll::-webkit-scrollbar{width:4px}
.right-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* EMPTY STATE */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--t3);gap:10px;padding:40px}
.empty svg{opacity:.15}
.empty h3{font-size:14px;font-weight:600;color:var(--t2)}
.empty p{font-size:12px;text-align:center;line-height:1.6}

/* PORTFOLIO PANEL */
.pf-panel{padding:16px}
.panel-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--t3);margin-bottom:12px}
.pf-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.pf-card{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:12px}
.pf-card .lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.pf-card .val{font-size:16px;font-weight:700;font-family:var(--mono)}

.h-list{display:flex;flex-direction:column;gap:0}
.h-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)}
.h-row:last-child{border-bottom:none}
.h-sym{font-weight:700;font-family:var(--mono);font-size:12px}
.h-shares{font-size:10px;color:var(--t2);margin-top:1px}
.h-right{text-align:right}
.h-val{font-family:var(--mono);font-size:12px;font-weight:600}
.h-pnl{font-family:var(--mono);font-size:10px;margin-top:1px}
.no-hold{font-size:12px;color:var(--t3);padding:8px 0}

.orders-list{display:flex;flex-direction:column;gap:6px}
.order-item{background:var(--s2);border:1px solid var(--border);border-radius:7px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between}
.order-info .oi-main{font-size:12px;font-weight:600}
.order-info .oi-sub{font-size:10px;color:var(--t2);margin-top:2px;font-family:var(--mono)}
.cancel-btn{background:none;border:1px solid var(--border);color:var(--t2);padding:3px 8px;border-radius:4px;font-size:10px;cursor:pointer;transition:.15s}
.cancel-btn:hover{border-color:var(--red);color:var(--red)}
.hist-item{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:11px}
.hist-item:last-child{border-bottom:none}
.hist-sym{font-family:var(--mono);font-weight:600}
.hist-detail{color:var(--t2);font-family:var(--mono)}
.hist-amt{font-family:var(--mono);font-weight:600}

/* STOCK DETAIL */
.sk-hdr{padding:16px 16px 12px;border-bottom:1px solid var(--border)}
.sk-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.sk-left .sk-sym{font-size:22px;font-weight:800;font-family:var(--mono)}
.sk-left .sk-name{font-size:11px;color:var(--t2);margin-top:2px}
.sk-left .sk-sector{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.sk-right{text-align:right}
.sk-price{font-size:28px;font-weight:700;font-family:var(--mono);letter-spacing:-1px;line-height:1}
.sk-chg{font-size:12px;font-family:var(--mono);margin-top:3px}
.sk-extra{display:flex;gap:16px;font-size:11px;color:var(--t2);font-family:var(--mono)}
.sk-extra span{white-space:nowrap}

/* CHART */
.chart-wrap{padding:12px 12px 6px;border-bottom:1px solid var(--border)}
.ct-tabs{display:flex;gap:2px;margin-bottom:8px}
.ct{padding:3px 9px;border-radius:4px;font-size:10px;font-weight:700;cursor:pointer;color:var(--t2);background:transparent;border:none;transition:.15s}
.ct:hover{color:var(--text)}
.ct.act{background:var(--s3);color:var(--text)}

/* KEY STATS */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;border-bottom:1px solid var(--border)}
.stat{padding:10px 16px;border-bottom:1px solid var(--border);border-right:1px solid var(--border)}
.stat:nth-child(2n){border-right:none}
.stat .slbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.stat .sval{font-size:12px;font-weight:600;font-family:var(--mono)}

/* TRADE */
.trade{padding:14px 16px;border-bottom:1px solid var(--border)}
.tr-tabs{display:flex;background:var(--s2);border-radius:7px;padding:3px;margin-bottom:12px}
.tt{flex:1;padding:7px;border:none;background:transparent;border-radius:5px;font-size:12px;font-weight:700;cursor:pointer;color:var(--t2);transition:.15s}
.tt.b{background:var(--s1);color:var(--green);box-shadow:0 1px 4px rgba(0,0,0,.3)}
.tt.s{background:var(--s1);color:var(--red);box-shadow:0 1px 4px rgba(0,0,0,.3)}
.ot-row{display:flex;gap:6px;margin-bottom:12px}
.ot-btn{flex:1;padding:5px;border:1px solid var(--border);background:transparent;color:var(--t2);border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;transition:.15s}
.ot-btn.act{border-color:var(--blue);color:var(--blue);background:rgba(37,99,235,.08)}
.tr-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.tr-lbl{font-size:12px;color:var(--t2)}
.tr-val{font-family:var(--mono);font-size:12px}
.tr-input{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:6px;font-size:13px;font-family:var(--mono);width:130px;text-align:right;outline:none;transition:.15s}
.tr-input:focus{border-color:var(--blue)}
.tr-total{padding:9px 0 0;border-top:1px solid var(--border);display:flex;justify-content:space-between;font-size:12px;margin-bottom:10px}
.tr-total .tv{font-family:var(--mono);font-weight:600}
.exec{width:100%;padding:11px;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:.3px;transition:opacity .15s}
.exec:hover{opacity:.82}
.exec.buy{background:var(--green);color:#fff}
.exec.sell{background:var(--red);color:#fff}
.avail{font-size:11px;color:var(--t2);text-align:center;margin-top:8px}

/* POSITION */
.pos-wrap{padding:12px 16px;border-bottom:1px solid var(--border)}
.pos-row{display:flex;justify-content:space-between;align-items:center}
.pos-left .pos-sym{font-size:13px;font-weight:700;font-family:var(--mono)}
.pos-left .pos-shares{font-size:10px;color:var(--t2);margin-top:1px}
.pos-right{text-align:right}
.pos-val{font-family:var(--mono);font-size:13px;font-weight:600}
.pos-pnl{font-family:var(--mono);font-size:11px;margin-top:1px}

/* PENDING */
.pending-wrap{padding:12px 16px;border-bottom:1px solid var(--border)}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--s1);border:1px solid var(--border);padding:10px 20px;border-radius:8px;font-size:12px;box-shadow:0 8px 28px rgba(0,0,0,.4);opacity:0;transition:.22s ease;z-index:999;pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.ok{border-left:3px solid var(--green)}
.toast.err{border-left:3px solid var(--red)}
.hidden{display:none!important}
</style>
</head>

function tick(){
  // Update prices
  STOCKS.forEach(st=>{
    const d=prices[st.s]*st.v*(Math.random()-.5)*2
    prices[st.s]=Math.max(.5,prices[st.s]+d)
    hist[st.s].push(prices[st.s])
    if(hist[st.s].length>600) hist[st.s].shift()
    vols[st.s]=Math.round(st.bv*(.7+Math.random()*.6))
  })
  // Update indices
  Object.keys(INDEX).forEach(k=>{
    const idx=INDEX[k]
    idx.v=Math.max(100,idx.v+idx.v*idx.vol*(Math.random()-.5)*2)
  })
  // Check limit orders
  pendingOrders.forEach((o,i)=>{
    const p=prices[o.sym]
    const hit=(o.side==='buy'&&p<=o.limit)||(o.side==='sell'&&p>=o.limit)
    if(hit){ executeFill(o); pendingOrders.splice(i,1); toast(`Limit order filled: ${o.side.toUpperCase()} ${o.shares} ${o.sym} @ $${f2(p)}`,'ok') }
  })
  renderTable(); renderIndices(); renderPF()
  if(sel){refreshDetailHeader();drawChart()}
}

// ─── SPARKLINE ────────────────────────────────────────────────────────────────
function drawSpark(canvas,data){
  const ctx=canvas.getContext('2d'),W=canvas.width,H=canvas.height
  ctx.clearRect(0,0,W,H)
  const d=data.slice(-50); if(d.length<2)return
  const mn=Math.min(...d),mx=Math.max(...d),rng=mx-mn||1
  const isUp=d[d.length-1]>=d[0]
  ctx.beginPath(); ctx.strokeStyle=css(isUp?'--green':'--red'); ctx.lineWidth=1.5; ctx.lineJoin='round'
  d.forEach((p,i)=>{const x=i/(d.length-1)*W,y=H-((p-mn)/rng)*H*.8-H*.1;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)})
  ctx.stroke()
}

// ─── MAIN CHART ───────────────────────────────────────────────────────────────
function drawChart(){
  if(!sel||!chartEl)return
  const canvas=chartEl,W=canvas.width,H=canvas.height
  const ctx=canvas.getContext('2d'); ctx.clearRect(0,0,W,H)
  const full=hist[sel]
  const d=period==='1D'?full.slice(-60):period==='1W'?full.slice(-200):period==='1M'?full.slice(-300):period==='3M'?full.slice(-450):full
  if(d.length<2)return
  const mn=Math.min(...d),mx=Math.max(...d),pad=(mx-mn)*.1||1
  const lo=mn-pad,hi=mx+pad,rng=hi-lo
  const px=i=>i/(d.length-1)*W, py=v=>H-((v-lo)/rng)*H
  const isUp=d[d.length-1]>=d[0], color=css(isUp?'--green':'--red')
  // Grid
  ctx.lineWidth=.5; ctx.strokeStyle=css('--border'); ctx.fillStyle=css('--t3'); ctx.font='9px SF Mono,Consolas,monospace'
  for(let i=1;i<5;i++){const y=H*i/5;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();ctx.fillText('$'+f2(hi-rng*(y/H)),4,y-3)}
  // Fill
  const grad=ctx.createLinearGradient(0,0,0,H)
  grad.addColorStop(0,color+'28'); grad.addColorStop(1,color+'00')
  ctx.beginPath(); ctx.moveTo(px(0),py(d[0]))
  d.forEach((p,i)=>ctx.lineTo(px(i),py(p)))
  ctx.lineTo(px(d.length-1),H); ctx.lineTo(0,H); ctx.closePath(); ctx.fillStyle=grad; ctx.fill()
  // Line
  ctx.beginPath(); ctx.strokeStyle=color; ctx.lineWidth=1.8; ctx.lineJoin='round'
  d.forEach((p,i)=>i===0?ctx.moveTo(px(i),py(p)):ctx.lineTo(px(i),py(p))); ctx.stroke()
  // Dot
  const lx=px(d.length-1),ly=py(d[d.length-1])
  ctx.beginPath(); ctx.arc(lx,ly,3.5,0,Math.PI*2); ctx.fillStyle=color; ctx.fill()
}

// ─── TABLE ────────────────────────────────────────────────────────────────────
function getVisible(){
  let list=STOCKS.slice()
  const q=searchQ.toLowerCase()
  if(q) list=list.filter(st=>st.s.toLowerCase().includes(q)||st.n.toLowerCase().includes(q))
  if(curSector) list=list.filter(st=>st.sec===curSector)
  if(curTab==='watchlist') list=list.filter(st=>watchlist.has(st.s))
  if(curTab==='portfolio') list=list.filter(st=>hold[st.s]&&hold[st.s].shares>0)
  if(curTab==='gainers'){ list=list.slice().sort((a,b)=>((prices[b.s]-opens[b.s])/opens[b.s])-((prices[a.s]-opens[a.s])/opens[a.s])); list=list.slice(0,20) }
  if(curTab==='losers'){ list=list.slice().sort((a,b)=>((prices[a.s]-opens[a.s])/opens[a.s])-((prices[b.s]-opens[b.s])/opens[b.s])); list=list.slice(0,20) }
  if(sortKey){
    list=list.slice().sort((a,b)=>{
      let va,vb
      if(sortKey==='p'){va=prices[a.s];vb=prices[b.s]}
      else if(sortKey==='chg'){va=prices[a.s]-opens[a.s];vb=prices[b.s]-opens[b.s]}
      else if(sortKey==='pct'){va=(prices[a.s]-opens[a.s])/opens[a.s];vb=(prices[b.s]-opens[b.s])/opens[b.s]}
      else if(sortKey==='cap'){va=prices[a.s]*a.so;vb=prices[b.s]*b.so}
      else if(sortKey==='vol'){va=vols[a.s];vb=vols[b.s]}
      return (va-vb)*sortDir
    })
  }
  return list
}

function buildDetail(){

  const cap=p*st.so
  const h=hist[sel],hi52=Math.max(...h)*1.02,lo52=Math.min(...h)*.98
  const eps=st.pe>0?p/st.pe:null
  const divYield=st.div>0?(st.div/p*100):0

  document.getElementById('right-panel').innerHTML=`
    <div class="sk-hdr">
      <div class="sk-top">
        <div class="sk-left">
          <div class="sk-sym">${sel}</div>
          <div class="sk-name">${st.n}</div>
          <div class="sk-sector">${st.sec}</div>
        </div>
        <div class="sk-right">
          <div class="sk-price" id="d-price">$${f2(p)}</div>
          <div class="sk-chg ${cls}" id="d-chg">${sg}$${f2(Math.abs(chg))} (${sg}${pct.toFixed(2)}%)</div>
        </div>
      </div>
      <div class="sk-extra">
        <span>Vol: ${fvol(vols[sel])}</span>
        <span>Mkt Cap: ${fcap(cap)}</span>
        ${st.div>0?`<span>Div: $${st.div.toFixed(2)} (${divYield.toFixed(2)}%)</span>`:''}
      </div>
    </div>

    <div class="chart-wrap">
      <div class="ct-tabs">
        ${['1D','1W','1M','3M','1Y'].map(t=>`<button class="ct${t===period?' act':''}" onclick="setPeriod('${t}')">${t}</button>`).join('')}
      </div>
      <canvas id="main-chart" style="display:block;width:100%;height:150px" width="360" height="150"></canvas>
    </div>

    <div class="stats-grid">
      <div class="stat"><div class="slbl">Open</div><div class="sval">$${f2(o)}</div></div>
      <div class="stat"><div class="slbl">Market Cap</div><div class="sval">${fcap(cap)}</div></div>
      <div class="stat"><div class="slbl">52W High</div><div class="sval up">$${f2(hi52)}</div></div>
      <div class="stat"><div class="slbl">52W Low</div><div class="sval dn">$${f2(lo52)}</div></div>
      <div class="stat"><div class="slbl">P/E Ratio</div><div class="sval">${st.pe>0?st.pe.toFixed(1):'—'}</div></div>
      <div class="stat"><div class="slbl">EPS</div><div class="sval">${eps?'$'+f2(eps):'—'}</div></div>
      <div class="stat"><div class="slbl">Div Yield</div><div class="sval">${divYield>0?divYield.toFixed(2)+'%':'—'}</div></div>
      <div class="stat"><div class="slbl">Avg Volume</div><div class="sval">${fvol(st.bv)}</div></div>
    </div>

    <div class="trade">
      <div class="tr-tabs">
        <button class="tt${tradeMode==='buy'?' b':''}" onclick="setMode('buy')">Buy</button>
        <button class="tt${tradeMode==='sell'?' s':''}" onclick="setMode('sell')">Sell</button>
      </div>
      <div class="ot-row">
        <button class="ot-btn${orderType==='market'?' act':''}" onclick="setOT('market')">Market</button>
        <button class="ot-btn${orderType==='limit'?' act':''}" onclick="setOT('limit')">Limit</button>
        <button class="ot-btn${orderType==='stop'?' act':''}" onclick="setOT('stop')">Stop</button>
      </div>
      <div class="tr-row"><span class="tr-lbl">Shares</span><input class="tr-input" id="tr-sh" type="number" min="1" step="1" value="1" oninput="updateTotal()"></div>
      ${orderType!=='market'?`<div class="tr-row"><span class="tr-lbl">${orderType==='limit'?'Limit':'Stop'} Price</span><input class="tr-input" id="tr-lim" type="number" step="0.01" value="${f2(p)}" oninput="updateTotal()"></div>`:''}
      <div class="tr-row"><span class="tr-lbl">Market Price</span><span class="tr-val" id="d-mktprice">$${f2(p)}</span></div>
      <div class="tr-total"><span>Est. Total</span><span class="tv" id="tr-tot">$${f2(p)}</span></div>
      <button class="exec ${tradeMode}" id="exec-btn" onclick="execute()">${tradeMode==='buy'?'Buy':'Sell'} ${sel}</button>
      <div class="avail" id="avail-info">Available: $${f2(cash)}</div>
    </div>

    <div class="pos-wrap" id="pos-section"></div>

    ${pendingOrders.filter(o=>o.sym===sel).length?`
    <div class="pending-wrap">
      <div class="panel-title" style="margin-bottom:8px">Pending Orders</div>
      <div class="orders-list">${pendingOrders.filter(o=>o.sym===sel).map(o=>`
        <div class="order-item">
          <div class="order-info"><div class="oi-main"><span class="${o.side==='buy'?'up':'dn'}">${o.side.toUpperCase()}</span> ${o.shares} ${o.sym}</div>
          <div class="oi-sub">${o.type.toUpperCase()} @ $${f2(o.limit)}</div></div>
          <button class="cancel-btn" onclick="cancelOrder(${o.id})">Cancel</button>
        </div>`).join('')}</div>
    </div>`:''}
  `
  chartEl=document.getElementById('main-chart'); drawChart(); refreshPos(); updateTotal()
}

function setPeriod(p){period=p;buildDetail()}

function setMode(m){
  tradeMode=m
  document.querySelectorAll('.tt').forEach((el,i)=>{el.className='tt'+(i===0&&m==='buy'?' b':i===1&&m==='sell'?' s':'')})
  const btn=document.getElementById('exec-btn')
  if(btn){btn.className='exec '+m;btn.textContent=(m==='buy'?'Buy':'Sell')+' '+sel}
  const ai=document.getElementById('avail-info')
  if(ai&&m==='buy')ai.textContent='Available: $'+f2(cash)
  else if(ai&&m==='sell'&&hold[sel])ai.textContent='Available: '+hold[sel].shares+' shares'
  else if(ai)ai.textContent=''
}

function setOT(t){orderType=t;buildDetail()}

function updateTotal(){
  if(!sel)return
  const sh=parseFloat(document.getElementById('tr-sh')?.value)||0
  const limEl=document.getElementById('tr-lim')
  const usePrice=orderType==='market'?prices[sel]:(parseFloat(limEl?.value)||prices[sel])
  const tot=document.getElementById('tr-tot'); if(tot)tot.textContent='$'+f2(sh*usePrice)
  const mp=document.getElementById('d-mktprice'); if(mp)mp.textContent='$'+f2(prices[sel])
}

function refreshPos(){
  const el=document.getElementById('pos-section'); if(!el||!sel)return
  const h=hold[sel]
  if(!h||h.shares<=0){el.innerHTML='';return}
  const cv=prices[sel]*h.shares,cb=h.avgCost*h.shares,pl=cv-cb,pp=pl/cb*100,cls=pl>=0?'up':'dn'
  el.innerHTML=`
    <div class="panel-title" style="padding:12px 16px 0;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--t3)">Your Position</div>
    <div style="padding:0 16px 12px">
      <div class="pos-row">
        <div class="pos-left"><div class="pos-sym">${h.shares} shares</div><div class="pos-shares">Avg cost $${f2(h.avgCost)}</div></div>
        <div class="pos-right"><div class="pos-val">$${f2(cv)}</div><div class="pos-pnl ${cls}">${sign(pl)}$${f2(Math.abs(pl))} (${sign(pp)}${pp.toFixed(2)}%)</div></div>
      </div>
    </div>`
}

// ─── TRADE ────────────────────────────────────────────────────────────────────
function execute(){
  if(!sel)return
  const shares=Math.floor(parseFloat(document.getElementById('tr-sh')?.value)||0)
  if(shares<=0){toast('Enter a valid number of shares','err');return}

  if(orderType==='market'){
    const p=prices[sel],total=shares*p
    if(tradeMode==='buy'){
      if(total>cash){toast('Insufficient cash','err');return}
      cash-=total; fillHold(sel,shares,p)
      orderHistory.push({sym:sel,side:'buy',shares,price:p,ts:Date.now()})
      toast(`Bought ${shares} share${shares>1?'s':''} of ${sel} @ $${f2(p)}`,'ok')
    } else {
      if(!hold[sel]||hold[sel].shares<shares){toast('Not enough shares','err');return}
      cash+=total; hold[sel].shares-=shares; if(hold[sel].shares===0)delete hold[sel]
      orderHistory.push({sym:sel,side:'sell',shares,price:p,ts:Date.now()})
      toast(`Sold ${shares} share${shares>1?'s':''} of ${sel} @ $${f2(p)}`,'ok')
    }
    renderPF(); buildDetail()
  } else {
    // Limit / Stop
    const limEl=document.getElementById('tr-lim')
    const limitPrice=parseFloat(limEl?.value)
    if(!limitPrice||limitPrice<=0){toast('Enter a valid limit price','err');return}
    if(tradeMode==='buy'&&shares*limitPrice>cash){toast('Insufficient cash for limit order','err');return}
    if(tradeMode==='sell'&&(!hold[sel]||hold[sel].shares<shares)){toast('Not enough shares','err');return}
    pendingOrders.push({id:orderId++,sym:sel,side:tradeMode,type:orderType,shares,limit:limitPrice,ts:Date.now()})
    toast(`${orderType.toUpperCase()} order placed: ${tradeMode.toUpperCase()} ${shares} ${sel} @ $${f2(limitPrice)}`,'ok')
    buildDetail()
  }
}

function executeFill(o){
  const p=prices[o.sym]
  if(o.side==='buy'){cash-=o.shares*p;fillHold(o.sym,o.shares,p)}
  else{if(hold[o.sym]){hold[o.sym].shares-=o.shares;if(hold[o.sym].shares<=0)delete hold[o.sym];cash+=o.shares*p}}
  orderHistory.push({sym:o.sym,side:o.side,shares:o.shares,price:p,ts:Date.now()})
}

function fillHold(s,shares,p){
  if(!hold[s])hold[s]={shares:0,avgCost:0}
  const h=hold[s],prev=h.shares*h.avgCost
  h.shares+=shares; h.avgCost=(prev+shares*p)/h.shares
}

function cancelOrder(id){
  const i=pendingOrders.findIndex(o=>o.id===id)
  if(i>=0){pendingOrders.splice(i,1);toast('Order cancelled','ok')}
  if(sel)buildDetail(); else showDefaultPanel()
}

// ─── CONTROLS ────────────────────────────────────────────────────────────────
function toggleStar(s,e){
  e.stopPropagation()
  watchlist.has(s)?watchlist.delete(s):watchlist.add(s)
  const el=document.getElementById('star-'+s); if(el)el.className='star '+(watchlist.has(s)?'on':'')
}

function setTab(tab,el){
  curTab=tab; sortKey=''; sortDir=1
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('act'))
  el.classList.add('act')
  if(tab==='portfolio'){sel=null;showDefaultPanel()}
  renderTable()
}

function onSearch(){searchQ=document.getElementById('search').value;renderTable()}
function onSectorChange(){curSector=document.getElementById('sector-sel').value;renderTable()}
function sortBy(k){if(sortKey===k)sortDir*=-1;else{sortKey=k;sortDir=-1};renderTable()}
function setPeriod(p){period=p;document.querySelectorAll('.ct').forEach(el=>el.classList.toggle('act',el.textContent===p));drawChart()}

function toggleTheme(){
  const d=document.documentElement,dark=d.getAttribute('data-theme')==='dark'
  d.setAttribute('data-theme',dark?'light':'dark')
  document.getElementById('tbtn').textContent=dark?'Dark':'Light'
  setTimeout(()=>{renderTable();if(sel)drawChart()},30)
}

function toast(msg,type){
  const t=document.getElementById('toast'); t.textContent=msg; t.className='toast '+type+' show'
  clearTimeout(toastTmr); toastTmr=setTimeout(()=>t.classList.remove('show'),2800)
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderTable(); renderIndices(); renderPF()
setInterval(tick, 1400)
</script>
</body>
</html>
