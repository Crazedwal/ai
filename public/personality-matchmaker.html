<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Personality Matchmaker</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #07071a;
      background-image:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(80,20,180,0.35) 0%, transparent 70%),
        radial-gradient(ellipse 60% 50% at 80% 80%, rgba(120,20,200,0.2) 0%, transparent 70%);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #fff; padding: 20px;
    }

    .phone {
      width: 380px; height: 680px;
      background: rgba(16, 12, 40, 0.95);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(140, 80, 255, 0.25);
      border-radius: 36px;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.04) inset, 0 0 80px rgba(100,40,220,0.18), 0 32px 80px rgba(0,0,0,0.6);
      display: flex; flex-direction: column; overflow: hidden;
    }

    .header {
      padding: 20px 22px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex; align-items: center; gap: 12px; flex-shrink: 0;
    }
    .header-icon {
      width: 38px; height: 38px; border-radius: 50%;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0; box-shadow: 0 0 16px rgba(168,85,247,0.4);
    }
    .header-text h2 { font-size: 15px; font-weight: 700; }
    .header-text p  { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 1px; }
    .header-badge {
      margin-left: auto; font-size: 10px; padding: 3px 8px;
      background: rgba(168,85,247,0.15); border: 1px solid rgba(168,85,247,0.3);
      border-radius: 20px; color: #c084fc; letter-spacing: 1px; text-transform: uppercase; flex-shrink: 0;
    }

    .screen { display: none; flex-direction: column; flex: 1; min-height: 0; }
    .screen.active { display: flex; }

    /* START */
    .start-screen { align-items: center; justify-content: center; gap: 14px; text-align: center; padding: 30px 28px; }
    .start-icon {
      width: 90px; height: 90px;
      background: linear-gradient(135deg, rgba(124,58,237,0.3), rgba(168,85,237,0.15));
      border: 2px solid rgba(168,85,247,0.4); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 40px; box-shadow: 0 0 40px rgba(168,85,247,0.3); margin-bottom: 4px;
    }
    .start-screen h1 {
      font-size: 20px; font-weight: 800; letter-spacing: 1px;
      background: linear-gradient(90deg, #c084fc, #818cf8);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .start-screen .tagline { font-size: 13px; color: rgba(255,255,255,0.5); line-height: 1.6; max-width: 260px; }
    .start-screen .note { font-size: 11px; color: rgba(255,255,255,0.25); }

    /* CHAT */
    .chat-messages {
      flex: 1; overflow-y: auto; padding: 16px 16px 8px;
      display: flex; flex-direction: column; gap: 10px; min-height: 0;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: rgba(168,85,247,0.3); border-radius: 4px; }

    .msg { display: flex; gap: 8px; max-width: 88%; animation: fadeUp 0.25s ease; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .msg.ai   { align-self: flex-start; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg-avatar {
      width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      display: flex; align-items: center; justify-content: center; font-size: 14px; margin-top: 2px;
    }
    .msg-bubble { padding: 10px 14px; border-radius: 18px; font-size: 13px; line-height: 1.55; }
    .msg.ai   .msg-bubble { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.08); border-bottom-left-radius: 4px; }
    .msg.user .msg-bubble { background: linear-gradient(135deg, #7c3aed, #a855f7); border-bottom-right-radius: 4px; }

    .typing-indicator { display: flex; align-items: center; gap: 4px; padding: 10px 14px; }
    .typing-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(168,85,247,0.7); animation: bounce 1.2s ease-in-out infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

    .chat-input-area {
      padding: 12px 14px 18px; border-top: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0; display: flex; gap: 8px; align-items: flex-end;
    }
    .chat-input-area textarea {
      flex: 1; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px; padding: 10px 14px; color: #fff; font-size: 13px;
      font-family: inherit; resize: none; outline: none; max-height: 100px; line-height: 1.4;
      transition: border-color 0.2s;
    }
    .chat-input-area textarea:focus { border-color: rgba(168,85,247,0.5); }
    .chat-input-area textarea::placeholder { color: rgba(255,255,255,0.25); }
    .send-btn {
      width: 38px; height: 38px; border-radius: 50%; border: none; cursor: pointer;
      background: linear-gradient(135deg, #7c3aed, #a855f7); color: #fff; font-size: 15px;
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; box-shadow: 0 4px 14px rgba(124,58,237,0.35);
    }
    .send-btn:hover { transform: scale(1.08); }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

    /* RESULT CARD */
    .result-card {
      background: linear-gradient(135deg, rgba(124,58,237,0.2), rgba(168,85,247,0.1));
      border: 1px solid rgba(168,85,247,0.35); border-radius: 18px;
      padding: 18px 16px; width: 100%;
    }
    .rc-top { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .rc-emoji {
      width: 52px; height: 52px; border-radius: 50%; flex-shrink: 0;
      background: rgba(168,85,247,0.2); border: 2px solid rgba(168,85,247,0.4);
      display: flex; align-items: center; justify-content: center; font-size: 26px;
    }
    .rc-title { font-size: 17px; font-weight: 800; }
    .rc-subtitle { font-size: 10px; letter-spacing: 2px; color: #a855f7; text-transform: uppercase; margin-top: 2px; }
    .rc-desc { font-size: 12px; color: rgba(255,255,255,0.6); line-height: 1.6; margin-bottom: 14px; }
    .rc-traits { display: flex; flex-direction: column; gap: 7px; margin-bottom: 14px; }
    .rc-trait { display: flex; align-items: center; gap: 8px; }
    .rc-trait-label { font-size: 11px; color: rgba(255,255,255,0.5); width: 74px; flex-shrink: 0; }
    .rc-track { flex: 1; height: 5px; background: rgba(255,255,255,0.08); border-radius: 5px; overflow: hidden; }
    .rc-fill { height: 100%; background: linear-gradient(90deg, #7c3aed, #c084fc); border-radius: 5px; width: 0; transition: width 0.8s cubic-bezier(0.4,0,0.2,1); }
    .rc-pct { font-size: 10px; font-weight: 700; color: #c084fc; width: 28px; text-align: right; flex-shrink: 0; }
    .rc-match {
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px; padding: 10px 12px; margin-bottom: 14px;
    }
    .rc-match-label { font-size: 9px; letter-spacing: 2px; color: #a855f7; text-transform: uppercase; margin-bottom: 3px; }
    .rc-match-name { font-size: 13px; font-weight: 600; }
    .rc-match-compat { font-size: 11px; color: rgba(255,255,255,0.35); }
    .use-btn {
      width: 100%; padding: 12px; border: none; border-radius: 50px; cursor: pointer;
      background: linear-gradient(135deg, #7c3aed, #a855f7); color: #fff;
      font-size: 14px; font-weight: 700; box-shadow: 0 6px 20px rgba(124,58,237,0.4);
      transition: all 0.2s; margin-bottom: 8px; display: block;
    }
    .use-btn:hover { transform: translateY(-2px); }
    .use-btn.saved { background: linear-gradient(135deg, #16a34a, #22c55e); box-shadow: 0 6px 20px rgba(34,197,94,0.3); }
    .restart-btn {
      width: 100%; padding: 10px; border: 1px solid rgba(255,255,255,0.1);
      border-radius: 50px; background: transparent; color: rgba(255,255,255,0.5);
      font-size: 13px; cursor: pointer; transition: all 0.2s;
    }
    .restart-btn:hover { border-color: rgba(168,85,247,0.4); color: #fff; }

    /* KCD CARD */
    .kcd-card {
      width: 100%; margin-top: 10px;
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px; padding: 16px; animation: fadeUp 0.3s ease 0.15s both;
    }
    .kcd-card h3 {
      font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
      color: rgba(168,85,247,0.9); margin-bottom: 14px;
    }
    .kcd-cols { display: flex; flex-direction: column; gap: 10px; }
    .kcd-col-label {
      font-size: 11px; font-weight: 700; margin-bottom: 5px; display: flex; align-items: center; gap: 5px;
    }
    .kcd-col-label.keep  { color: #22c55e; }
    .kcd-col-label.change { color: #f59e0b; }
    .kcd-col-label.delete { color: #ef4444; }
    .kcd-cols textarea {
      width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px; padding: 9px 12px; color: #fff; font-size: 12px;
      font-family: inherit; resize: none; outline: none; transition: border-color 0.2s; line-height: 1.5;
    }
    .kcd-cols textarea:focus { border-color: rgba(168,85,247,0.45); }
    .kcd-cols textarea::placeholder { color: rgba(255,255,255,0.2); }
    .kcd-save-row { display: flex; align-items: center; justify-content: flex-end; gap: 8px; margin-top: 10px; }
    .kcd-saved { font-size: 10px; color: #22c55e; opacity: 0; transition: opacity 0.3s; }
    .kcd-save-btn {
      padding: 7px 16px; border: none; border-radius: 50px; cursor: pointer;
      background: linear-gradient(135deg, #7c3aed, #a855f7); color: #fff;
      font-size: 12px; font-weight: 700; transition: all 0.2s;
    }
    .kcd-save-btn:hover { transform: translateY(-1px); }

    .btn {
      width: 100%; padding: 14px; border: none; border-radius: 50px; cursor: pointer;
      font-size: 15px; font-weight: 700; transition: all 0.2s;
      background: linear-gradient(135deg, #7c3aed, #a855f7); color: #fff;
      box-shadow: 0 8px 30px rgba(124,58,237,0.4);
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(124,58,237,0.55); }

    /* CONSTRAINTS CARD */
    .start-screen { overflow-y: auto; justify-content: flex-start; }
    .start-screen::-webkit-scrollbar { width: 3px; }
    .start-screen::-webkit-scrollbar-thumb { background: rgba(168,85,247,0.3); border-radius: 3px; }
    .start-hero { display: flex; flex-direction: column; align-items: center; gap: 14px; text-align: center; padding-top: 20px; width: 100%; }
    .constraints-card {
      width: 100%; margin-top: 6px; margin-bottom: 20px;
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px; padding: 16px;
    }
    .constraints-card h3 {
      font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
      color: rgba(168,85,247,0.9); margin-bottom: 14px;
    }
    .cc-field { margin-bottom: 12px; }
    .cc-field:last-child { margin-bottom: 0; }
    .cc-label { font-size: 11px; color: rgba(255,255,255,0.4); margin-bottom: 5px; display: block; }
    .cc-field input, .cc-field textarea {
      width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px; padding: 9px 12px; color: #fff; font-size: 12px;
      font-family: inherit; outline: none; resize: none; transition: border-color 0.2s;
    }
    .cc-field input:focus, .cc-field textarea:focus { border-color: rgba(168,85,247,0.45); }
    .cc-field input::placeholder, .cc-field textarea::placeholder { color: rgba(255,255,255,0.2); }
    .cc-saved { font-size: 10px; color: #22c55e; text-align: right; margin-top: 8px; height: 14px; transition: opacity 0.3s; }
  </style>
</head>
<body>
<div class="phone">
  <div class="header">
    <div class="header-icon">🔮</div>
    <div class="header-text">
      <h2>Personality Matchmaker</h2>
      <p>Discover your archetype</p>
    </div>
    <div class="header-badge" id="exchange-badge">AI</div>
  </div>

  <div class="screen start-screen active" id="screen-start">
    <div class="start-hero">
      <div class="start-icon">🔮</div>
      <h1>What's Your Archetype?</h1>
      <p class="tagline">Have a real conversation with AI. It asks questions and reveals your unique personality type.</p>
      <p class="note">No multiple choice — just talk naturally.</p>
      <button class="btn" onclick="startChat()" style="margin-top:8px">Start Conversation</button>
    </div>

    <div class="constraints-card">
      <h3>Your Constraints</h3>
      <div class="cc-field">
        <label class="cc-label">Who are you?</label>
        <input id="cc-who" type="text" placeholder="e.g. developer, student, designer..." oninput="saveConstraints()" />
      </div>
      <div class="cc-field">
        <label class="cc-label">Frustrations</label>
        <textarea id="cc-frustrations" rows="2" placeholder="e.g. overly long answers, unnecessary disclaimers..." oninput="saveConstraints()"></textarea>
      </div>
      <div class="cc-field">
        <label class="cc-label">Comforts</label>
        <textarea id="cc-comforts" rows="2" placeholder="e.g. code examples, short answers, step-by-step..." oninput="saveConstraints()"></textarea>
      </div>
      <div class="cc-saved" id="cc-saved"></div>
    </div>
  </div>

  <div class="screen" id="screen-chat">
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input-area" id="input-area">
      <textarea id="chat-input" placeholder="Type your answer..." rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled>➤</button>
    </div>
  </div>
</div>

<script>
  // ─── API KEY: reads from localStorage so you don't have to hardcode it ───
  const API_KEY = localStorage.getItem('openrouter_api_key') || ""
  // ─────────────────────────────────────────────────────────────────────────

  const MODEL = "deepseek/deepseek-chat-v3-0324:free"

  const SYSTEM_PROMPT = `You are a warm, insightful personality analyst. Discover the user's personality type through natural conversation.

Rules:
- Ask ONE short, interesting question at a time — never multiple at once
- Questions should feel like genuine curiosity, not a formal quiz
- After 5-6 meaningful exchanges you have enough data to determine their type
- When you have enough, respond with ONLY this JSON object and nothing else (no markdown, no explanation):
{
  "done": true,
  "title": "The [Archetype]",
  "subtitle": "[2-4 word descriptor]",
  "emoji": "[single emoji]",
  "description": "[2-3 sentences about this personality]",
  "traits": { "Strategic": 0-100, "Creative": 0-100, "Analytical": 0-100, "Empathetic": 0-100 },
  "bestMatch": "[compatible archetype name]",
  "compatibility": 50-99,
  "bestMatchEmoji": "[emoji]"
}

Begin with a very brief warm greeting and your first question. Keep all non-JSON messages to 1-2 sentences maximum.`

  const MOCK_QUESTIONS = [
    "Hey! I'm going to figure out your personality type through conversation. Let's start — what's something you've been genuinely excited about lately?",
    "Interesting! When you face a tough decision, do you usually go with your gut feeling or think it through step by step?",
    "Got it. If a close friend came to you with a big problem, what's your first instinct — try to fix it, or just be there and listen?",
    "One more — if you had a completely free weekend, what would your ideal way to spend it look like?",
    "Last question — would you say you're someone who plans things out carefully or prefers to just see where things go?",
  ]

  // ─── CONSTRAINTS ────────────────────────────────────────────────────────────
  const CONSTRAINTS_KEY = 'userConstraints'

  function loadConstraints() {
    try { return JSON.parse(localStorage.getItem(CONSTRAINTS_KEY) || 'null') } catch { return null }
  }

  function saveConstraints() {
    const who = document.getElementById('cc-who').value.trim()
    const frustrations = document.getElementById('cc-frustrations').value.trim()
    const comforts = document.getElementById('cc-comforts').value.trim()
    localStorage.setItem(CONSTRAINTS_KEY, JSON.stringify({ who, frustrations, comforts }))
    const saved = document.getElementById('cc-saved')
    saved.textContent = '✓ Saved'
    clearTimeout(window._ccTimer)
    window._ccTimer = setTimeout(() => { saved.textContent = '' }, 1500)
  }

  function initConstraintsFields() {
    const c = loadConstraints()
    if (!c) return
    document.getElementById('cc-who').value = c.who || ''
    document.getElementById('cc-frustrations').value = c.frustrations || ''
    document.getElementById('cc-comforts').value = c.comforts || ''
  }
  initConstraintsFields()
  // ────────────────────────────────────────────────────────────────────────────

  let history      = []
  let exchangeCount = 0
  let waiting      = false

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'))
    document.getElementById(id).classList.add('active')
  }

  function startChat() {
    history       = []
    exchangeCount = 0
    waiting       = false
    document.getElementById('chat-messages').innerHTML = ''
    document.getElementById('chat-input').value = ''
    document.getElementById('chat-input').disabled = false
    document.getElementById('send-btn').disabled = true
    document.getElementById('input-area').style.display = 'flex'
    document.getElementById('exchange-badge').textContent = 'AI'
    showScreen('screen-chat')
    setTimeout(aiRespond, 400)
  }

  function autoResize(el) {
    el.style.height = 'auto'
    el.style.height = Math.min(el.scrollHeight, 100) + 'px'
    document.getElementById('send-btn').disabled = el.value.trim() === '' || waiting
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault()
      if (!document.getElementById('send-btn').disabled) sendMessage()
    }
  }

  function addMessage(role, html) {
    const el = document.createElement('div')
    el.className = `msg ${role}`
    if (role === 'ai') {
      el.innerHTML = `<div class="msg-avatar">🔮</div><div class="msg-bubble">${html}</div>`
    } else {
      el.innerHTML = `<div class="msg-bubble">${html}</div>`
    }
    document.getElementById('chat-messages').appendChild(el)
    scrollBottom()
  }

  function addTyping() {
    const el = document.createElement('div')
    el.className = 'msg ai'; el.id = 'typing'
    el.innerHTML = `<div class="msg-avatar">🔮</div><div class="msg-bubble"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>`
    document.getElementById('chat-messages').appendChild(el)
    scrollBottom()
  }

  function removeTyping() { document.getElementById('typing')?.remove() }
  function scrollBottom() {
    const el = document.getElementById('chat-messages')
    el.scrollTop = el.scrollHeight
  }

  async function sendMessage() {
    const input = document.getElementById('chat-input')
    const text  = input.value.trim()
    if (!text || waiting) return
    input.value = ''; input.style.height = 'auto'
    document.getElementById('send-btn').disabled = true
    addMessage('user', esc(text))
    history.push({ role: 'user', content: text })
    exchangeCount++
    document.getElementById('exchange-badge').textContent = `${Math.min(exchangeCount, 5)}/5`
    await aiRespond()
  }

  async function aiRespond() {
    waiting = true
    addTyping()
    try {
      const reply = API_KEY ? await callAPI() : await mockReply()
      removeTyping()
      const result = tryParse(reply)
      if (result) { showResult(result); return }
      addMessage('ai', esc(reply))
      history.push({ role: 'assistant', content: reply })
    } catch (err) {
      removeTyping()
      addMessage('ai', 'Sorry, something went wrong. Try refreshing.')
      console.error(err)
    }
    waiting = false
    document.getElementById('send-btn').disabled = document.getElementById('chat-input').value.trim() === ''
    document.getElementById('chat-input').focus()
  }

  function buildSystemPrompt() {
    const c = loadConstraints()
    const extra = [
      c?.who          ? `The user describes themselves as: ${c.who}.` : '',
      c?.frustrations ? `They find the following frustrating (avoid these): ${c.frustrations}.` : '',
      c?.comforts     ? `They prefer: ${c.comforts}.` : '',
    ].filter(Boolean).join(' ')
    return extra ? `${SYSTEM_PROMPT}\n\nAbout the user: ${extra}` : SYSTEM_PROMPT
  }

  async function callAPI() {
    const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${API_KEY}`,
        'Content-Type': 'application/json',
        'HTTP-Referer': window.location.origin,
        'X-Title': 'AI Personality Matchmaker'
      },
      body: JSON.stringify({
        model: MODEL,
        messages: [{ role: 'system', content: buildSystemPrompt() }, ...history],
        temperature: 0.85
      })
    })
    if (!res.ok) throw new Error(`HTTP ${res.status}`)
    const data = await res.json()
    return (data.choices?.[0]?.message?.content || '').trim()
  }

  async function mockReply() {
    await new Promise(r => setTimeout(r, 1000 + Math.random() * 700))
    const idx = exchangeCount - 1
    if (idx < MOCK_QUESTIONS.length) return MOCK_QUESTIONS[idx]
    return JSON.stringify({
      done: true, title: "The Architect", subtitle: "Strategic Visionary", emoji: "🏛️",
      description: "You see patterns others miss. You plan three steps ahead and your friends come to you when they need a strategy. Creative, analytical, and quietly confident.",
      traits: { Strategic: 88, Creative: 72, Analytical: 81, Empathetic: 65 },
      bestMatch: "The Explorer", compatibility: 87, bestMatchEmoji: "🧭"
    })
  }

  function tryParse(text) {
    try {
      const obj = JSON.parse(text.replace(/```json?|```/g, '').trim())
      if (obj.done && obj.title) return obj
    } catch (_) {}
    return null
  }

  function showResult(data) {
    document.getElementById('input-area').style.display = 'none'
    document.getElementById('exchange-badge').textContent = 'Done'

    const wrap = document.createElement('div')
    wrap.style.cssText = 'width:100%;animation:fadeUp 0.3s ease'
    wrap.innerHTML = `
      <div class="result-card">
        <div class="rc-top">
          <div class="rc-emoji">${data.emoji || '🔮'}</div>
          <div>
            <div class="rc-title">${esc(data.title)}</div>
            <div class="rc-subtitle">${esc(data.subtitle)}</div>
          </div>
        </div>
        <div class="rc-desc">${esc(data.description)}</div>
        <div class="rc-traits">
          ${['Strategic','Creative','Analytical','Empathetic'].map(k => `
            <div class="rc-trait">
              <span class="rc-trait-label">${k}</span>
              <div class="rc-track"><div class="rc-fill" id="rf-${k}"></div></div>
              <span class="rc-pct" id="rp-${k}">0%</span>
            </div>`).join('')}
        </div>
        <div class="rc-match">
          <div>
            <div class="rc-match-label">Best Match</div>
            <div class="rc-match-name">${esc(data.bestMatch)}</div>
            <div class="rc-match-compat">${data.compatibility}% compatibility</div>
          </div>
          <span style="font-size:26px">${data.bestMatchEmoji || '💛'}</span>
        </div>
        <button class="use-btn" id="use-btn" onclick="usePersona()">✦ Use This Persona in Chat</button>
        <button class="restart-btn" onclick="startChat()">Start Over</button>
      </div>`
    document.getElementById('chat-messages').appendChild(wrap)

    // KCD card
    const kcdExisting = loadKCD()
    const kcdWrap = document.createElement('div')
    kcdWrap.innerHTML = `
      <div class="kcd-card">
        <h3>Keep / Change / Delete</h3>
        <div class="kcd-cols">
          <div>
            <div class="kcd-col-label keep">✦ Keep</div>
            <textarea id="kcd-keep" rows="2" placeholder="What do you want to keep about yourself?">${esc(kcdExisting?.keep || '')}</textarea>
          </div>
          <div>
            <div class="kcd-col-label change">↻ Change</div>
            <textarea id="kcd-change" rows="2" placeholder="What do you want to work on or shift?">${esc(kcdExisting?.change || '')}</textarea>
          </div>
          <div>
            <div class="kcd-col-label delete">✕ Delete</div>
            <textarea id="kcd-delete" rows="2" placeholder="What do you want to let go of?">${esc(kcdExisting?.delete || '')}</textarea>
          </div>
        </div>
        <div class="kcd-save-row">
          <span class="kcd-saved" id="kcd-saved">Saved!</span>
          <button class="kcd-save-btn" onclick="saveKCD()">Save</button>
        </div>
      </div>`
    document.getElementById('chat-messages').appendChild(kcdWrap)

    scrollBottom()

    // Store data for usePersona
    window._personaData = data

    requestAnimationFrame(() => setTimeout(() => {
      const t = data.traits || {}
      ;['Strategic','Creative','Analytical','Empathetic'].forEach(k => {
        const v = Math.min(99, Math.max(1, t[k] || 50))
        document.getElementById(`rf-${k}`).style.width = v + '%'
        document.getElementById(`rp-${k}`).textContent = v + '%'
      })
    }, 150))
  }

  function loadKCD() {
    try { return JSON.parse(localStorage.getItem('userKCD') || 'null') } catch { return null }
  }

  function saveKCD() {
    const keep   = document.getElementById('kcd-keep')?.value.trim() || ''
    const change = document.getElementById('kcd-change')?.value.trim() || ''
    const del    = document.getElementById('kcd-delete')?.value.trim() || ''
    localStorage.setItem('userKCD', JSON.stringify({ keep, change, delete: del }))
    const saved = document.getElementById('kcd-saved')
    saved.style.opacity = '1'
    setTimeout(() => { saved.style.opacity = '0' }, 1500)
  }

  function usePersona() {
    const data = window._personaData
    if (!data) return
    localStorage.setItem('userPersona', JSON.stringify(data))
    const btn = document.getElementById('use-btn')
    btn.textContent = '✓ Persona Active in Chat!'
    btn.classList.add('saved')
    btn.disabled = true
  }

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;')
  }
</script>
</body>
</html>
